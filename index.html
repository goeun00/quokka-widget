<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>Quokka Work Dock</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="ctx-menu" id="ctxMenu">
    <div class="ctx-item" id="ctxTheme">🌙 다크 모드</div>
    <div class="ctx-item danger" id="ctxQuit">✕ 종료</div>
  </div>

  <div class="confirm-overlay" id="confirmOverlay">
    <div class="confirm-box">
      <div class="confirm-msg" id="confirmMsg">삭제하시겠어요?</div>
      <div class="confirm-btns">
        <button class="confirm-btn cancel" id="confirmCancel" type="button">취소</button>
        <button class="confirm-btn ok" id="confirmOk" type="button">삭제</button>
      </div>
    </div>
  </div>

  <main class="app-shell">
    <section class="dock-frame" id="dockFrame">
      <section class="dock-panel">
        <header class="dock-header">
          <div class="avatar" id="avatarBtn" aria-label="profile"><span class="svg-icon"><svg viewBox="0 0 24 24"><path d="M8 13c-2.2-4.8-2.6-8.2-.8-9 1.7-.7 3.8 2.4 4.8 6.6C13 6.4 15.1 3.3 16.8 4c1.8.8 1.4 4.2-.8 9"/><path d="M6.5 13.5c0 4 2.4 6.5 5.5 6.5s5.5-2.5 5.5-6.5c0-2.3-2.4-3.8-5.5-3.8s-5.5 1.5-5.5 3.8Z"/><path d="M9.5 14.5h.01M14.5 14.5h.01M10.5 17c.8.6 2.2.6 3 0"/></svg></span></div>
          <div class="title-area">
            <div class="eyebrow">Jira + Git</div>
            <div class="title" id="dynamicTitle">@goeun · Jira</div>
          </div>
          <div class="actions">
            <button class="icon-btn" type="button" id="refreshBtn" aria-label="refresh"><span class="svg-icon"><svg viewBox="0 0 24 24"><path d="M20 6v5h-5"/><path d="M19 11a7 7 0 1 0-2.1 5"/></svg></span></button>
            <button class="icon-btn" type="button" id="settingsBtn" aria-label="settings"><span class="svg-icon icon-settings"><svg viewBox="0 0 24 24"><path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z"/><path d="M19.4 15a1.8 1.8 0 0 0 .4 2l.1.1-2 3.4-.2-.1a1.8 1.8 0 0 0-2.1.4l-.1.1h-4l-.1-.1a1.8 1.8 0 0 0-2.1-.4l-.2.1-2-3.4.1-.1a1.8 1.8 0 0 0 .4-2 1.8 1.8 0 0 0-1.6-1.2H6v-4h.1A1.8 1.8 0 0 0 7.7 8a1.8 1.8 0 0 0-.4-2l-.1-.1 2-3.4.2.1a1.8 1.8 0 0 0 2.1-.4l.1-.1h4l.1.1a1.8 1.8 0 0 0 2.1.4l.2-.1 2 3.4-.1.1a1.8 1.8 0 0 0-.4 2 1.8 1.8 0 0 0 1.6 1.2h.1v4h-.1a1.8 1.8 0 0 0-1.7 1.2Z"/></svg></span></button>
            <button class="icon-btn" type="button" id="closePanelBtn" aria-label="close"><span class="svg-icon"><svg viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg></span></button>
          </div>
        </header>

        <nav class="top-tabs" id="topTabs" aria-label="상위 메뉴">
          <button class="top-tab is-on" type="button" data-view="jira"><span>Jira Issue</span><span class="tab-count" id="tabJiraCount">0</span></button>
          <button class="top-tab" type="button" data-view="pr"><span>PR</span><span class="tab-count" id="tabPrCount">0</span></button>
        </nav>

        <section class="view is-active" data-panel="jira">
          <section class="summary-grid" aria-label="Jira 작업 현황">
            <button class="summary-card is-on" type="button" data-jira-filter="todo"><span class="summary-label">TODO</span><span class="summary-num" id="nTodo">0</span></button>
            <button class="summary-card" type="button" data-jira-filter="wip"><span class="summary-label">DOING</span><span class="summary-num" id="nWip">0</span></button>
            <button class="summary-card" type="button" data-jira-filter="done"><span class="summary-label">DONE</span><span class="summary-num" id="nDone">0</span></button>
            <button class="summary-card" type="button" data-jira-filter="pin"><span class="summary-label">PIN</span><span class="summary-num" id="nPin">0</span></button>
          </section>
          <label class="search"><span class="svg-icon"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m16.5 16.5 4 4"/></svg></span><input class="search-input-native" id="jiraSearch" type="text" placeholder="이슈 / 브랜치 / 메모 검색..." /></label>
          <div class="state" id="jiraState" hidden></div>
          <section class="issue-list" id="issueList"></section>
        </section>

        <section class="view" data-panel="pr">
          <section class="summary-grid pr-summary" aria-label="PR 현황">
            <button class="summary-card is-on" type="button" data-pr-filter="all"><span class="summary-label">ALL</span><span class="summary-num" id="nPrAll">0</span></button>
            <button class="summary-card" type="button" data-pr-filter="open"><span class="summary-label">OPEN</span><span class="summary-num" id="nPrOpen">0</span></button>
            <button class="summary-card" type="button" data-pr-filter="done"><span class="summary-label">DONE</span><span class="summary-num" id="nPrDone">0</span></button>
          </section>
          <label class="search"><span class="svg-icon"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m16.5 16.5 4 4"/></svg></span><input class="search-input-native" id="prSearch" type="text" placeholder="PR 제목 / 브랜치 / 레포 검색..." /></label>
          <div class="state" id="prState" hidden></div>
          <section class="pr-list" id="prList"></section>
        </section>

        <section class="view" data-panel="settings">
          <div class="settings-body">
            <article class="setting-card">
              <div class="setting-title">Settings</div>
              <div class="setting-desc">실제 Jira / GitHub 설정과 저장소 데이터를 그대로 연결해요.</div>
              <section class="setting-section">
                <div class="setting-section-head"><div><div class="setting-section-kicker">Appearance</div><div class="setting-title" style="font-size:14px">Personalization</div></div></div>
                <div class="form-row"><label for="userName">사용자 이름</label><input id="userName" class="field-input" type="text" placeholder="goeun" /></div>
                <div class="form-row"><label for="dockCharacter">Dock 캐릭터 선택</label><select id="dockCharacter" class="field-input"><option value="quokka">쿼카 🐨</option><option value="rabbit">토끼 🐰</option></select></div>
              </section>
              <section class="setting-section">
                <div class="setting-section-head"><div><div class="setting-section-kicker">Jira</div><div class="setting-title" style="font-size:14px">Issue Sync</div></div><span class="repo-tag base">required</span></div>
                <div class="form-row"><label for="jiraUrl">Jira URL</label><input id="jiraUrl" class="field-input" type="text" placeholder="https://yourcompany.atlassian.net" /></div>
                <div class="form-row"><label for="jiraToken">Jira Personal Access Token</label><input id="jiraToken" class="field-input" type="password" placeholder="PAT 입력" /></div>
                <div class="form-row">
                  <label class="setting-check" for="usePersonalJira">
                    <input id="usePersonalJira" type="checkbox" />
                    <span>개인 Jira 사용</span>
                  </label>
                </div>
                <div class="form-row" id="jiraEmailWrap" hidden>
                  <label for="jiraEmail">Jira Email</label>
                  <input id="jiraEmail" class="field-input" type="email" placeholder="Atlassian 로그인 이메일" autocomplete="email" />
                </div>
                <div class="form-row"><label for="doneDays">Done 이슈 보관 기간</label><select id="doneDays" class="field-input"><option value="30">30일</option><option value="60">60일</option><option value="90">90일</option></select></div>
              </section>
              <section class="setting-section">
                <div class="setting-section-head"><div><div class="setting-section-kicker">GitHub</div><div class="setting-title" style="font-size:14px">PR Sync</div></div><span class="repo-tag base">auto PR</span></div>
                <div class="form-row"><label for="githubUrl">GitHub URL</label><input id="githubUrl" class="field-input" type="text" placeholder="https://github.company.com" /></div>
                <div class="form-row"><label for="githubToken">GitHub Token</label><input id="githubToken" class="field-input" type="password" placeholder="PAT 입력" /></div>
                <div class="repo-box">
                  <div class="setting-title" style="font-size:13px">Repositories</div>
                  <div class="setting-desc">레포와 base 브랜치를 한 줄로 추가해요. Base는 여러 개면 쉼표로 입력해요.</div>
                  <div class="repo-row">
                    <input class="field-input" id="repoFullName" type="text" placeholder="org-publisher/starro" aria-label="레포지토리 입력" />
                    <input class="field-input" id="repoBranches" type="text" placeholder="dev,main,stg" aria-label="base 브랜치 입력" />
                    <button class="mini-btn" id="addRepoBtn" type="button" aria-label="추가"><span class="svg-icon"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg></span></button>
                  </div>
                  <div class="repo-list" id="repoList"></div>
                </div>
              </section>
              <button class="save-btn" id="saveSettingsBtn" type="button">저장하고 메인으로</button>
            </article>
          </div>
        </section>
      </section>

      <footer class="dock-bottom"><div class="speech" id="speech">쿼카를 누르면 Jira 이슈, 토끼를 누르면 PR을 열어요</div><div class="character"><span class="svg-icon"><svg viewBox="0 0 24 24"><path d="M8 13c-2.2-4.8-2.6-8.2-.8-9 1.7-.7 3.8 2.4 4.8 6.6C13 6.4 15.1 3.3 16.8 4c1.8.8 1.4 4.2-.8 9"/><path d="M6.5 13.5c0 4 2.4 6.5 5.5 6.5s5.5-2.5 5.5-6.5c0-2.3-2.4-3.8-5.5-3.8s-5.5 1.5-5.5 3.8Z"/><path d="M9.5 14.5h.01M14.5 14.5h.01M10.5 17c.8.6 2.2.6 3 0"/></svg></span></div></footer>
    </section>

    <div class="dock-bottom-native" id="dock">
      <button class="dock-handle" id="dockHandle" type="button" aria-label="Dock 이동">⋮⋮</button>
      <button class="dock-native-btn" id="dockBtn" type="button" aria-label="Jira 패널 열기"><img src="assets/quokka.webp" alt="" /></button>
      <button class="dock-native-btn" id="ghDockBtn" type="button" aria-label="GitHub 패널 열기"><img src="assets/rabit.webp" alt="" /></button>
    </div>
  </main>

  <script src="./renderer.js"></script>
</body>
</html>
