<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>Quokka Jira Dock</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="ctx-menu" id="ctxMenu">
      <div class="ctx-item" id="ctxTheme">☀ 라이트 모드</div>
      <div class="ctx-item danger" id="ctxQuit">✕ 종료</div>
    </div>

    <div class="confirm-overlay" id="confirmOverlay">
      <div class="confirm-box">
        <div class="confirm-icon"></div>
        <div class="confirm-msg" id="confirmMsg">삭제하시겠어요?</div>
        <div class="confirm-btns">
          <button class="confirm-btn cancel" id="confirmCancel" type="button">취소</button>
          <button class="confirm-btn ok" id="confirmOk" type="button">삭제</button>
        </div>
      </div>
    </div>

    <div class="w" id="w">
      <!-- ── Jira 패널 ── -->
      <div class="panel" id="panel">
        <div class="summary">
          <div class="stop">
            <div class="gh-user-badge">
              <div class="gh-avatar" id="jiraAvatar">JR</div>
              <span class="gh-username" id="jiraUsername"></span>
            </div>
            <span class="stitle" id="ptitle" style="text-align: center"
              >Jira Issues</span
            >
            <button class="hb button-re" id="rbtn" type="button"></button>
            <button
              class="hb button-setting"
              id="settingsBtn"
              type="button"
            ></button>
            <button
              class="hb button-close"
              id="jiraCloseBtn"
              type="button"
            ></button>
          </div>
          <div class="srow" id="statRow">
            <button class="sc on" data-filter="todo" type="button">
              <span class="sl">To Do</span><span class="sn" id="n-todo">0</span>
            </button>
            <button class="sc" data-filter="wip" type="button">
              <span class="sl">In Progress</span
              ><span class="sn" id="n-wip">0</span>
            </button>
            <button class="sc" data-filter="done" type="button">
              <span class="sl">Done</span><span class="sn" id="n-done">0</span>
            </button>
            <button class="pin-card" id="pinCard" type="button">
              <div class="pin-label">PIN</div>
              <span class="pin-cnt" id="n-pin">0</span>
            </button>
          </div>
        </div>
        <div class="proj-bar" id="projBar" hidden></div>
        <section id="issueView">
          <div class="state loading" id="loadingState">불러오는 중...</div>
          <div class="state error" id="errorState" hidden></div>
          <div class="state empty" id="emptyState" hidden>이슈가 없어요 🎉</div>
          <div class="il" id="issueList" hidden></div>
        </section>
        <div class="search-wrap" id="searchWrap">
          <span class="search-icon"
            ><svg width="13" height="13" viewBox="0 0 13 13" fill="none">
              <circle
                cx="5.5"
                cy="5.5"
                r="4"
                stroke="currentColor"
                stroke-width="1.3"
              />
              <path
                d="M9 9l2.5 2.5"
                stroke="currentColor"
                stroke-width="1.3"
                stroke-linecap="round"
              /></svg></span>
          <input
            class="search-input"
            id="searchInput"
            type="text"
            placeholder="이슈 검색..."
            autocomplete="off"
            spellcheck="false"
          />
          <div class="search-clear" id="searchClear">✕</div>
        </div>
        <section id="settingsView" hidden>
          <div class="sbody">
            <div class="srow2">
              <label class="slb" for="iUrl">Jira URL</label
              ><input
                class="si"
                id="iUrl"
                type="text"
                placeholder="https://yourcompany.atlassian.net"
                autocomplete="off"
                spellcheck="false"
              />
            </div>
            <div class="srow2">
              <label class="slb" for="iPat">Personal Access Token</label
              ><input
                class="si"
                id="iPat"
                type="password"
                placeholder="PAT 입력"
                autocomplete="off"
              />
            </div>
            <div class="srow2">
              <label class="slb" for="iDays">Done 이슈 보관 기간</label>
              <select class="si" id="iDays">
                <option value="30">30일</option>
                <option value="60" selected>60일</option>
              </select>
            </div>
            <button class="sv2" id="saveSettingsBtn" type="button">
              저장하고 불러오기
            </button>
            <div class="sh">Jira → 프로필 → 개인 액세스 토큰</div>
          </div>
        </section>
      </div>

      <!-- ── GitHub 패널 ── -->
      <div class="panel gh-panel" id="ghPanel">
        <div class="summary">
          <div class="stop">
            <div class="gh-user-badge">
              <div class="gh-avatar" id="ghAvatar">GH</div>
              <span class="gh-username" id="ghUsername"></span>
            </div>
            <span class="stitle" id="ghPtitle" style="text-align: center"
              >GitHub</span
            >
            <button class="hb button-re" id="ghRbtn" type="button"></button>
            <button
              class="hb button-setting"
              id="ghSettingsBtn"
              type="button"
            ></button>
            <button
              class="hb button-close"
              id="ghCloseBtn"
              type="button"
            ></button>
          </div>
          <div class="srow" id="ghTabRow">
            <button class="sc on" data-gh-tab="home" type="button">
              <span class="sl">바로가기</span>
            </button>
            <button class="sc" data-gh-tab="prs" type="button">
              <span class="sl">PR 목록</span>
              <span class="sn" id="gh-n-all">0</span>
            </button>
            <button class="sc" data-gh-tab="builder" type="button">
              <span class="sl">PR / Diff</span>
            </button>
            <button class="pin-card" id="ghPinSummary" type="button" disabled>
              <div class="pin-label">Open</div>
              <span class="pin-cnt" id="gh-n-open">0</span>
            </button>
          </div>
        </div>

        <section id="ghHomeView">
          <div class="sbody">
            <div class="gh-sec">레포</div>
            <div class="gh-repo-search-wrap">
              <svg width="11" height="11" viewBox="0 0 13 13" fill="none">
                <circle
                  cx="5.5"
                  cy="5.5"
                  r="4"
                  stroke="currentColor"
                  stroke-width="1.3"
                />
                <path
                  d="M9 9l2.5 2.5"
                  stroke="currentColor"
                  stroke-width="1.3"
                  stroke-linecap="round"
                />
              </svg>
              <input
                class="gh-repo-search-input"
                id="ghRepoSearchInput"
                type="text"
                placeholder="레포 검색..."
                autocomplete="off"
                spellcheck="false"
              />
            </div>
            <div class="gh-repo-list-scroll" id="ghShortcutList"></div>
            <div class="gh-sec" style="margin-top: 10px">최근 링크</div>
            <div id="ghHistoryList"></div>
          </div>
        </section>

        <section id="ghListView" hidden>
          <div class="search-wrap gh-search-wrap">
            <span class="search-icon"
              ><svg width="13" height="13" viewBox="0 0 13 13" fill="none">
                <circle
                  cx="5.5"
                  cy="5.5"
                  r="4"
                  stroke="currentColor"
                  stroke-width="1.3"
                />
                <path
                  d="M9 9l2.5 2.5"
                  stroke="currentColor"
                  stroke-width="1.3"
                  stroke-linecap="round"
                /></svg></span>
            <input
              class="search-input"
              id="ghSearchInput"
              type="text"
              placeholder="PR 제목 / 브랜치 / 레포 검색..."
              autocomplete="off"
              spellcheck="false"
            />
            <div class="search-clear" id="ghSearchClear">✕</div>
          </div>
          <div class="proj-bar gh-pill-bar" id="ghPrFilterBar">
            <button class="ptag on" data-gh-filter="all" type="button">전체</button>
            <button class="ptag" data-gh-filter="open" type="button">Open <span id="gh-n-open" class="gh-pill-count">0</span></button>
            <button class="ptag" data-gh-filter="done" type="button">완료 <span id="gh-n-done" class="gh-pill-count">0</span></button>
          </div>
          <div class="state loading" id="ghLoadingState">불러오는 중...</div>
          <div class="state error" id="ghErrorState" hidden></div>
          <div class="state empty" id="ghEmptyState" hidden>PR이 없어요 🎉</div>
          <div class="il gh-pr-list" id="ghPRList" hidden></div>
        </section>

        <section id="ghBuilderView" hidden>
          <div class="sbody">
            <div class="srow2">
              <label class="slb" for="ghBuildRepo">레포</label>
              <select class="si" id="ghBuildRepo"></select>
            </div>
            <div class="srow2">
              <label class="slb gh-slb-em">Base 브랜치</label>
              <div
                class="proj-bar"
                id="ghBranchBar"
                style="margin-top: 6px"
              ></div>
            </div>
            <div class="srow2">
              <label class="slb gh-slb-em" for="ghHeadInput">Compare</label>
              <div class="gh-builder-row">
                <input
                  class="si"
                  id="ghHeadInput"
                  type="text"
                  placeholder="feature/my-branch 또는 abc1234"
                  autocomplete="off"
                  spellcheck="false"
                  style="flex: 1"
                />
                <button
                  class="gh-ba-btn"
                  id="ghGoPrBtn"
                  type="button"
                  title="PR 열기"
                >
                  ↗
                </button>
                <button
                  class="gh-ba-btn"
                  id="ghCopyPrBtn"
                  type="button"
                  title="링크 복사"
                >
                  ⎘
                </button>
              </div>
            </div>
            <div class="gh-builder-divider"></div>
            <div class="srow2">
              <label class="slb gh-slb-em" for="ghBaseShaInput">SHA Diff</label>
              <div class="gh-builder-row">
                <input
                  class="si"
                  id="ghBaseShaInput"
                  type="text"
                  placeholder="base SHA"
                  autocomplete="off"
                  spellcheck="false"
                  style="flex: 1"
                />
                <span class="gh-sha-sep">→</span>
                <input
                  class="si"
                  id="ghHeadShaInput"
                  type="text"
                  placeholder="head SHA"
                  autocomplete="off"
                  spellcheck="false"
                  style="flex: 1"
                />
                <button
                  class="gh-ba-btn"
                  id="ghGoDiffBtn"
                  type="button"
                  title="Diff 열기"
                >
                  ↗
                </button>
                <button
                  class="gh-ba-btn"
                  id="ghCopyDiffBtn"
                  type="button"
                  title="링크 복사"
                >
                  ⎘
                </button>
              </div>
            </div>
            <div class="sh" id="ghBuildStatus"></div>
          </div>
        </section>

        <section id="ghSettingsView" hidden>
          <div class="sbody">
            <div class="srow2">
              <label class="slb" for="ghIBaseUrl">GitHub Base URL</label>
              <input
                class="si"
                id="ghIBaseUrl"
                type="text"
                placeholder="https://github.company.com"
                autocomplete="off"
                spellcheck="false"
              />
            </div>
            <div class="srow2">
              <label class="slb" for="ghIToken">GitHub PAT</label>
              <input
                class="si"
                id="ghIToken"
                type="password"
                placeholder="PAT 입력"
                autocomplete="off"
              />
            </div>
            <div class="srow2">
              <label class="slb" for="ghDefaultBranches"
                >기본 Base 브랜치</label
              >
              <input
                class="si"
                id="ghDefaultBranches"
                type="text"
                placeholder="main,dev,stg"
                autocomplete="off"
                spellcheck="false"
              />
            </div>
            <div class="slb" style="margin-bottom: 6px">레포지토리 목록</div>
            <div id="ghRepoList" class="gh-repo-list"></div>
            <button
              class="sv2"
              id="ghAddRepoBtn"
              type="button"
              style="margin-bottom: 6px"
            >
              + 레포 추가
            </button>
            <button class="sv2" id="ghSaveBtn" type="button">
              저장하고 불러오기
            </button>
            <div class="sh">
              기본 Base 브랜치는 전체 레포 공통값이고, 레포별 브랜치를 입력하면
              그 값이 우선이에요. 예: main,dev,stg,release
            </div>
          </div>
        </section>
      </div>

      <!-- ── Dock ── -->
      <div class="dock" id="dock">
        <button
          class="dock-handle"
          id="dockHandle"
          type="button"
          aria-label="Dock 이동"
        >
          ⋮⋮
        </button>
        <button
          class="qb"
          id="dockBtn"
          type="button"
          aria-label="Jira 패널 열기"
        >
          <div class="bbl" id="bbl"></div>
     <img id="quokka" src="assets/quokka.webp" class="qc">
        </button>
        <button
          class="qb"
          id="ghDockBtn"
          type="button"
          aria-label="GitHub 패널 열기"
        >
       <img id="rabit" src="assets/rabit.webp" class="qc2">
        </button>
      </div>
    </div>

    <!-- ── 템플릿 ── -->
    <template id="projTagTemplate"
      ><button class="ptag" type="button"></button
    ></template>

    <template id="issueGroupTemplate">
      <section class="issue-group">
        <div class="gh">
          <span class="group-label"></span>
          <div class="gl"></div>
          <span class="group-count"></span>
        </div>
        <div class="group-items"></div>
      </section>
    </template>

    <template id="issueCardTemplate">
      <article class="ic">
        <div class="pst"></div>
        <div class="ib">
          <div class="ik-row"><button class="ik" type="button"></button></div>
          <div class="it-row"><span class="it"></span></div>
          <div class="sb-row">
            <span class="sb"></span><span class="type-badge"></span>
          </div>
          <div class="box_memo">
            <span class="memo-inline-text" style="display: none"></span>
            <div class="chips-wrap" style="display: none">
              <div class="chips"></div>
            </div>
          </div>
        </div>
        <div class="ic-meta">
          <div class="ic-top">
            <button class="pin-btn" type="button" aria-label="핀"></button>
          </div>
          <div class="ic-bot"><span class="idate"></span></div>
        </div>
      </article>
    </template>

    <template id="memoDropTemplate">
      <div class="memo-drop">
        <div class="memo-drop-inner">
          <div class="memo-read">
            <span class="memo-read-empty">메모 없음</span>
            <div class="memo-read-actions">
              <button class="memo-edit-trigger la-btn" type="button"></button>
              <button class="memo-del-trigger la-btn del" type="button"></button>
            </div>
          </div>
          <div class="memo-edit-area">
            <textarea class="memo-ta" placeholder="메모를 입력하세요... (URL 입력 시 자동 링크)"></textarea>
            <div class="memo-edit-btns">
              <button class="me-btn memo-cancel" type="button">취소</button>
              <button class="me-btn ok memo-ok" type="button">확인</button>
            </div>
          </div>
          <div class="link-lbl">branch</div>
          <div class="branch-list"></div>
          <div class="link-add-row">
            <input class="branch-input" type="text" placeholder="feat/my-branch" autocomplete="off" spellcheck="false"/>
            <button class="branch-add-btn" type="button">+ add</button>
          </div>
          <div class="link-lbl">link</div>
          <div class="link-list"></div>
          <div class="link-add-row">
            <input class="link-input" type="text" placeholder="URL 붙여넣기..." autocomplete="off" spellcheck="false"/>
            <button class="link-add-btn" type="button">+ add</button>
          </div>
        </div>
      </div>
    </template>

    <template id="linkItemTemplate">
      <div class="link-item">
        <div class="link-read">
          <button class="link-ico-btn" type="button"></button>
          <div class="link-info">
            <span class="link-name-text"></span>
            <span class="link-url-text"></span>
          </div>
          <div class="link-action-btns">
            <button class="la-btn la-edit" type="button"></button>
            <button class="la-btn del la-del" type="button"></button>
          </div>
        </div>
        <div class="link-edit">
          <div class="le-row">
            <span class="le-lbl">이름</span
            ><input
              class="le-input le-name"
              type="text"
              placeholder="링크 이름"
              autocomplete="off"
            />
          </div>
          <div class="le-row">
            <span class="le-lbl">URL</span
            ><input
              class="le-input le-url"
              type="text"
              placeholder="https://..."
              autocomplete="off"
            />
          </div>
          <div class="le-btns">
            <button class="le-btn le-cancel" type="button">취소</button>
            <button class="le-btn ok le-ok" type="button">확인</button>
          </div>
        </div>
      </div>
    </template>

    <template id="iconOptionTemplate"><div class="ico-opt"></div></template>

    <template id="ghPRCardTemplate">
      <article class="gh-pr-card">
        <div class="gh-pr-top">
          <span class="gh-pr-badge"></span>
          <span class="gh-pr-repo"></span>
          <span class="gh-pr-num"></span>
        </div>
        <div class="gh-pr-title"></div>
        <div class="gh-pr-meta">
          <span class="gh-pr-branch"></span>
          <span class="gh-pr-date"></span>
        </div>
        <div class="gh-pr-actions">
          <button class="gh-pr-diff-btn" type="button">Diff 보기</button>
          <button class="gh-pr-open-btn" type="button">↗ 열기</button>
        </div>
        <div class="gh-reviews"></div>
      </article>
    </template>

    <!-- owner/repo 한 칸으로 붙여넣기 -->
    <template id="ghRepoRowTemplate">
      <div class="gh-repo-row">
        <input
          class="si gh-repo-full"
          type="text"
          placeholder="owner/repo"
          autocomplete="off"
          spellcheck="false"
          style="flex: 1; min-width: 0"
        />
        <input
          class="si gh-repo-branches"
          type="text"
          placeholder="main,dev,stg"
          autocomplete="off"
          spellcheck="false"
          style="flex: 1; min-width: 0"
        />
        <button class="gh-repo-del" type="button">✕</button>
      </div>
    </template>

    <script>
      /* ══════════════════════════════════════════════
        WebGL 캐릭터
      ══════════════════════════════════════════════ */
      function initQuokka(canvasId, videoId, speed = 1.0) {
        const vid = document.getElementById(videoId),
          c = document.getElementById(canvasId);
        const gl = c.getContext("webgl", {
          premultipliedAlpha: false,
          alpha: true,
        });
        c.width = 180;
        c.height = 245;
        const vsrc = `attribute vec2 p;attribute vec2 u;varying vec2 v;void main(){gl_Position=vec4(p,0,1);v=u;}`;
        const fsrc = `precision highp float;uniform sampler2D t;varying vec2 v;void main(){vec4 c=texture2D(t,v);float r=c.r,g=c.g,b=c.b;float cb=g-max(r,b);float spill=max(0.,cb-0.05);vec3 col=vec3(r+spill*0.5,g-spill,b+spill*0.5);float alpha=1.-smoothstep(0.14,0.42,cb);alpha=clamp(alpha,0.,1.);if(alpha<0.01){gl_FragColor=vec4(0.);}else{gl_FragColor=vec4(col*alpha,alpha);}}`;
        function mkSh(tp, src) {
          const s = gl.createShader(tp);
          gl.shaderSource(s, src);
          gl.compileShader(s);
          return s;
        }
        const pr = gl.createProgram();
        gl.attachShader(pr, mkSh(gl.VERTEX_SHADER, vsrc));
        gl.attachShader(pr, mkSh(gl.FRAGMENT_SHADER, fsrc));
        gl.linkProgram(pr);
        gl.useProgram(pr);
        function vbuf(d) {
          const b = gl.createBuffer();
          gl.bindBuffer(gl.ARRAY_BUFFER, b);
          gl.bufferData(gl.ARRAY_BUFFER, d, gl.STATIC_DRAW);
          return b;
        }
        const pb = vbuf(new Float32Array([-1, -1, 1, -1, -1, 1, 1, 1])),
          ub = vbuf(new Float32Array([0, 1, 1, 1, 0, 0, 1, 0]));
        gl.bindBuffer(gl.ARRAY_BUFFER, pb);
        const pl = gl.getAttribLocation(pr, "p");
        gl.enableVertexAttribArray(pl);
        gl.vertexAttribPointer(pl, 2, gl.FLOAT, false, 0, 0);
        gl.bindBuffer(gl.ARRAY_BUFFER, ub);
        const ul = gl.getAttribLocation(pr, "u");
        gl.enableVertexAttribArray(ul);
        gl.vertexAttribPointer(ul, 2, gl.FLOAT, false, 0, 0);
        const tx = gl.createTexture();
        gl.bindTexture(gl.TEXTURE_2D, tx);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
        gl.enable(gl.BLEND);
        gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);
        function updateVideoRatio() {
          if (!vid.videoWidth || !vid.videoHeight) return;
          const ca = c.width / c.height,
            va = vid.videoWidth / vid.videoHeight;
          let u0 = 0,
            u1 = 1,
            v0 = 0,
            v1 = 1;
          if (va > ca) {
            const s = ca / va;
            u0 = (1 - s) / 2;
            u1 = 1 - u0;
          } else {
            const s = va / ca;
            v0 = (1 - s) / 2;
            v1 = 1 - v0;
          }
          gl.bindBuffer(gl.ARRAY_BUFFER, ub);
          gl.bufferData(
            gl.ARRAY_BUFFER,
            new Float32Array([u0, v1, u1, v1, u0, v0, u1, v0]),
            gl.STATIC_DRAW,
          );
        }
        vid.addEventListener("loadedmetadata", updateVideoRatio);
        if (vid.readyState >= 1) updateVideoRatio();
        function draw() {
          if (vid.readyState >= 2) {
            gl.bindTexture(gl.TEXTURE_2D, tx);
            gl.texImage2D(
              gl.TEXTURE_2D,
              0,
              gl.RGBA,
              gl.RGBA,
              gl.UNSIGNED_BYTE,
              vid,
            );
            gl.viewport(0, 0, c.width, c.height);
            gl.clear(gl.COLOR_BUFFER_BIT);
            gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
          }
          if ("requestVideoFrameCallback" in vid)
            vid.requestVideoFrameCallback(draw);
          else requestAnimationFrame(draw);
        }
        requestAnimationFrame(draw);

      function openCtxMenuByDock() {
        const rect = dock.getBoundingClientRect();
        const menuWidth = 140;
        const menuHeight = 76;
        const gap = 8;

        let left = rect.left + rect.width / 2 - menuWidth / 2;
        let top = rect.top - menuHeight - gap;

        left = Math.max(8, Math.min(left, window.innerWidth - menuWidth - 8));
        top = Math.max(8, top);

        ctxMenu.style.left = left + "px";
        ctxMenu.style.top = top + "px";
        updateCtxThemeLabel();
        ctxMenu.classList.add("show");
      }

      dock.addEventListener("contextmenu", (e) => {
        e.preventDefault();
        openCtxMenuByDock();

      document.addEventListener("click", (e) => {

        dockOffsetY = e.screenY - window.screenY;
      });

window.addEventListener('mouseup', () => {
  if (!dockDragging) return
  dockDragging = false
  dock.classList.remove('is-dragging')
  if (dockRafId) { cancelAnimationFrame(dockRafId); dockRafId = null }
})

window.addEventListener('mousemove', e => {
  if (!dockDragging) return
  dockPendingX = e.screenX - dockOffsetX
  if (dockRafId) return
  dockRafId = requestAnimationFrame(() => {
    window.api?.moveWindow?.({ x: dockPendingX, y: window.screenY })
    dockRafId = null
  })
})

      function mkIco(iClass, sizeClass = "ico-sm") {

            "notion",
            "docs.google",
            "confluence",
            "atlassian",
            "drive.google",
          ],
        },
        { id: "icoGithub", cls: "i-ico-github", match: ["github", "gitlab"] },
        { id: "icoDesktop", cls: "i-ico-desktop", match: ["desktop", "pc"] },
        { id: "icoMobile", cls: "i-ico-mobile", match: ["mobile"] },
        { id: "icoFile", cls: "i-ico-file", match: ["file://"] },
        { id: "icoLink", cls: "i-ico-link", match: [] },
      ];
      function detectIcon(url) {
        const u = (url || "").toLowerCase();

            "ico-opt" + (ico.id === selectedId ? " selected" : "");
          opt.appendChild(mkIco(ico.cls, "ico-md"));
          opt.addEventListener("click", (e) => {

            wrap.classList.remove("show");
          });
          wrap.appendChild(opt);
        });
        return wrap;
      }
      function linkLabel(url) {
        try {

            const parts = u.pathname.split("/");
            return decodeURIComponent(parts[parts.length - 1]) || url;
          }
          return u.hostname.replace("www.", "");
        } catch {
          return url;
        }
      }

            showConfirm("메모를 삭제할까요?", () => {
              delete memos[issue.key];
              window.api?.saveMemos(memos);
              syncDrop();
              refreshInline(issue.key, node);
            });
          });
        drop.querySelector(".memo-cancel").addEventListener("click", (e) => {
          e.stopPropagation();
          drop.querySelector(".memo-ta").value = memos[issue.key] || "";
          drop.querySelector(".memo-read").style.display = "";
          drop.querySelector(".memo-edit-area").classList.remove("show");
        });
        drop.querySelector(".memo-ok").addEventListener("click", (e) => {
          e.stopPropagation();
          const val = drop.querySelector(".memo-ta").value.trim();
          if (val) memos[issue.key] = val;
          else delete memos[issue.key];
          window.api?.saveMemos(memos);
          const readEl = drop.querySelector(".memo-read"),
            span = readEl.querySelector("span");
          span.className = val ? "memo-read-text" : "memo-read-empty";
          span.innerHTML = val ? memoToHtml(val) : "메모 없음";
          span.querySelectorAll("a").forEach((a) => {
            a.addEventListener("click", (ev) => {
              ev.stopPropagation();
              window.api?.openUrl(a.dataset.url || a.textContent);
            });
          });
          readEl.style.display = "";
          drop.querySelector(".memo-edit-area").classList.remove("show");
          refreshInline(issue.key, node);
        });
        const branchInput = drop.querySelector(".branch-input");
        const branchAddBtn = drop.querySelector(".branch-add-btn");
        const doAddBranch = () => {
          const val = branchInput.value.trim();
          if (!val) return;
          if (!branches[issue.key]) branches[issue.key] = [];
          if (!branches[issue.key].includes(val)) {
            branches[issue.key].push(val);
            window.api?.saveBranches?.(branches);
            refreshInline(issue.key, node);
          }
          branchInput.value = "";
          renderBranchList();
        };
        branchAddBtn.addEventListener("click", (e) => { e.stopPropagation(); doAddBranch(); });
        branchInput.addEventListener("keydown", (e) => { if (e.key === "Enter") { e.preventDefault(); e.stopPropagation(); doAddBranch(); } });
        branchInput.addEventListener("click", (e) => e.stopPropagation());

        const addInput = drop.querySelector(".link-input"),
          addBtn = drop.querySelector(".link-add-btn");
        const doAdd = () => {
          let url = addInput.value.trim();
          if (!url) return;
          if (!links[issue.key]) links[issue.key] = [];
          links[issue.key].push({ url, label: "", iconId: detectIcon(url).id });
          addInput.value = "";
          window.api?.saveLinks?.(links);
          renderLinkList();
          refreshInline(issue.key, node);
          setTimeout(() => drop.querySelector(".link-input")?.focus(), 50);
        };
        addBtn.addEventListener("click", (e) => {
          e.stopPropagation();
          doAdd();
        });
        addInput.addEventListener("keydown", (e) => {
          if (e.key === "Enter") {
            e.preventDefault();
            e.stopPropagation();
            doAdd();
          }
        });
        addInput.addEventListener("click", (e) => e.stopPropagation());
        drop.addEventListener("click", (e) => {
          if (
            !e.target.closest(".link-ico-btn") &&
            !e.target.closest(".ico-picker")
          )
            drop
              .querySelectorAll(".ico-picker")
              .forEach((p) => p.classList.remove("show"));
        });
        syncDrop();
        refreshInline(issue.key, node);
        node.addEventListener("click", (e) => {
          if (e.target.closest(".ik") || e.target.closest(".pin-btn")) return;
          const isOpen = drop.classList.contains("open");
          if (activeDropEl && activeDropEl !== drop)
            activeDropEl.classList.remove("open");
          if (isOpen) {
            drop.classList.remove("open");
            activeDropEl = null;
          } else {
            syncDrop();
            drop.classList.add("open");
            activeDropEl = drop;
          }
        });
        const wrapper = document.createElement("div");
        wrapper.appendChild(node);
        wrapper.appendChild(drop);
        return wrapper;
      }

      const ghState = {
        open: false,
        tab: "home",
        isSettings: false,
        prs: [],
        token: "",
        baseUrl: "",
        repos: [],
        history: [],
        selectedBaseByRepo: {},

      const ghPanel = document.getElementById("ghPanel");

      function ghFmt(d) {
        if (!d) return "";
        const diff = Math.floor((new Date() - new Date(d)) / 86400000);
        return diff === 0
          ? "오늘"
          : diff === 1
            ? "어제"
            : diff < 7
              ? `${diff}일 전`
              : diff < 30
                ? `${Math.floor(diff / 7)}주 전`
                : `${Math.floor(diff / 30)}달 전`;
      }

      function ghRenderUserBadge() {
        const el = document.getElementById("ghAvatar");
        const un = document.getElementById("ghUsername");
        if (!el || !un || !ghState.login) return;
        un.textContent = ghState.login;
        el.textContent = ghState.login.slice(0, 2).toUpperCase();
      }

      function jiraRenderUserBadge(login, initials) {
        const el = document.getElementById("jiraAvatar");
        const un = document.getElementById("jiraUsername");
        if (!el || !un || !login) return;
        un.textContent = login;
        el.textContent = initials || login.slice(0, 2).toUpperCase();
      }

      function ghNormalizeBaseUrl(url = "") {
        return url.trim().replace(/\/$/, "");
      }

      function ghRepoWebUrl(repo) {
        return `${ghState.baseUrl}/${repo.owner}/${repo.repo}`;
      }

      function ghSetListState(type, msg = "") {
        ghListView.hidden = false;
        ghLoadingState.hidden = type !== "loading";
        ghErrorState.hidden = type !== "error";
        ghEmptyState.hidden = type !== "empty";
        ghPRList.hidden = type !== "list";
        if (type === "error") ghErrorState.textContent = msg;
      }

      function ghSetView(view) {
        ghHomeView.hidden = view !== "home";
        ghListView.hidden = view !== "list";
        ghBuilderView.hidden = view !== "builder";
        ghSettingsView.hidden = view !== "settings";
      }

      async function ghLoadSettings() {
        let s = {};
        try {
          s = (await window.api?.getGHSettings?.()) ?? {};
        } catch (e) {}
        ghState.token = s.token || "";
        ghState.baseUrl = ghNormalizeBaseUrl(s.baseUrl || "");
        ghState.defaultBranches = Array.isArray(s.defaultBranches)
          ? s.defaultBranches.filter(Boolean)
          : String(s.defaultBranches || "main,dev,stg")
              .split(",")
              .map((v) => v.trim())
              .filter(Boolean);
        ghState.repos = Array.isArray(s.repos)
          ? s.repos.map((r) => ({
              owner: r.owner,
              repo: r.repo,
              branches: Array.isArray(r.branches)
                ? r.branches
                : String(r.branches || "")
                    .split(",")
                    .map((v) => v.trim())
                    .filter(Boolean),
            }))
          : [];
      }

      async function ghLoadHistory() {
        try {
          ghState.history = (await window.api?.getGHHistory?.()) || [];
        } catch (e) {
          ghState.history = [];
        }
      }

      async function ghSaveSettings() {
        const token = document.getElementById("ghIToken").value.trim();
        const baseUrl = ghNormalizeBaseUrl(
          document.getElementById("ghIBaseUrl").value,
        );
        const defaultBranchesRaw = document
          .getElementById("ghDefaultBranches")
          .value.trim();
        const defaultBranches = (defaultBranchesRaw || "main,dev,stg")
          .split(",")
          .map((v) => v.trim())
          .filter(Boolean);
        const rows = document.querySelectorAll("#ghRepoList .gh-repo-row");
        const repos = [];

        rows.forEach((row) => {
          const full = row.querySelector(".gh-repo-full").value.trim();
          const branchesRaw = row
            .querySelector(".gh-repo-branches")
            .value.trim();
          const [owner, repo] = full.split("/");
          if (!owner || !repo) return;
          const branches = branchesRaw
            ? branchesRaw
                .split(",")
                .map((v) => v.trim())
                .filter(Boolean)
            : [];
          repos.push({ owner, repo, branches });
        });

        await window.api?.saveGHSettings?.({
          token,
          baseUrl,
          repos,
          defaultBranches,
        });
        ghState.token = token;
        ghState.baseUrl = baseUrl;
        ghState.defaultBranches = defaultBranches;
        ghState.repos = repos;
      }

      function ghAddRepoRow(data = {}) {
        const row = document
          .getElementById("ghRepoRowTemplate")
          .content.firstElementChild.cloneNode(true);
        row.querySelector(".gh-repo-full").value =
          data.owner && data.repo ? `${data.owner}/${data.repo}` : "";
        row.querySelector(".gh-repo-branches").value = Array.isArray(
          data.branches,
        )
          ? data.branches.join(",")
          : data.branches || "";
        row
          .querySelector(".gh-repo-del")
          .addEventListener("click", () => row.remove());
        document.getElementById("ghRepoList").appendChild(row);
      }

      function ghRenderSettingsUI() {
        document.getElementById("ghIBaseUrl").value = ghState.baseUrl;
        document.getElementById("ghIToken").value = ghState.token;
        document.getElementById("ghDefaultBranches").value = (
          ghState.defaultBranches || []
        ).join(",");
        const list = document.getElementById("ghRepoList");
        list.innerHTML = "";
        ghState.repos.forEach(ghAddRepoRow);
      }

      function ghPushHistory(item) {
        const next = [
          item,
          ...ghState.history.filter((v) => v.url !== item.url),
        ].slice(0, 10);
        ghState.history = next;
        window.api?.saveGHHistory?.(next);
        ghRenderHome();
      }

      function ghRenderHome() {
        const shortcutList = document.getElementById("ghShortcutList");
        const historyList = document.getElementById("ghHistoryList");
        const searchInput = document.getElementById("ghRepoSearchInput");

        function renderRepoList(filter = "") {
          shortcutList.innerHTML = "";
          const filtered = ghState.repos.filter(
            (r) =>
              !filter ||
              r.repo.toLowerCase().includes(filter) ||
              r.owner.toLowerCase().includes(filter),
          );
          if (!ghState.repos.length) {
            shortcutList.innerHTML =
              '<div class="state empty" style="font-size:11px;padding:10px 0">⚙ 설정에서 레포를 추가하세요</div>';
            return;
          }
          if (!filtered.length) {
            shortcutList.innerHTML =
              '<div class="state empty" style="font-size:11px;padding:8px 0">검색 결과가 없어요</div>';
            return;
          }
          filtered.forEach((repo) => {
            const row = document.createElement("button");
            row.type = "button";
            row.className = "gh-repo-row-item";
            row.innerHTML = `
        <div class="gh-repo-row-dot"></div>
        <div class="gh-repo-row-body">
          <div class="gh-repo-row-name">${repo.repo}</div>
          <div class="gh-repo-row-owner">${repo.owner}</div>
        </div>
        <span class="gh-repo-row-arrow">↗</span>`;
            row.addEventListener("click", () =>
              window.api?.openUrl(ghRepoWebUrl(repo)),
            );
            shortcutList.appendChild(row);
          });
        }

        renderRepoList();
        if (searchInput) {
          searchInput.value = "";
          searchInput.oninput = (e) =>
            renderRepoList(e.target.value.trim().toLowerCase());
        }

        historyList.innerHTML = "";
        if (!ghState.history.length) {
          historyList.innerHTML =
            '<div class="state empty" style="font-size:11px;padding:8px 0">최근 생성 링크가 없어요</div>';
          return;
        }
        ghState.history.forEach((item) => {
          const row = document.createElement("div");
          row.className = "gh-hist-item";
          const typeCls = item.type === "PR" ? "gh-hist-pr" : "gh-hist-diff";
          let shortUrl = item.url;
          try {
            shortUrl = new URL(item.url).pathname.replace(
              /^\/[^/]+\/[^/]+\//,
              "",
            );
          } catch {}
          row.innerHTML = `
      <span class="gh-hist-type ${typeCls}">${item.type}</span>
      <div class="gh-hist-body">
        <div class="gh-hist-label">${item.label}</div>
        <div class="gh-hist-url">${shortUrl}</div>
      </div>
      <div class="gh-hist-actions">
        <button class="gh-hist-btn" type="button" title="열기">↗</button>
        <button class="gh-hist-btn" type="button" title="복사">⎘</button>
      </div>`;
          row
            .querySelector(".gh-hist-btn:first-child")
            .addEventListener("click", (e) => {
              e.stopPropagation();
              window.api?.openUrl(item.url);
            });
          row
            .querySelector(".gh-hist-btn:last-child")
            .addEventListener("click", (e) => {
              e.stopPropagation();
              navigator.clipboard?.writeText(item.url);
            });
          historyList.appendChild(row);
        });
      }

      function ghGroupByRepo(list) {
        const map = new Map();
        list.forEach((pr) => {
          const key = `${pr.owner}/${pr.repo}`;
          if (!map.has(key)) map.set(key, []);
          map.get(key).push(pr);
        });
        return [...map.entries()];
      }
      function ghApplyPRFilter(list) {
        const query = (ghState.prQuery || "").trim().toLowerCase();
        const filteredByState =
          ghState.prFilter === "open"
            ? list.filter((pr) => pr.stateGroup === "open")
            : ghState.prFilter === "done"
              ? list.filter((pr) => pr.stateGroup === "done")
              : list;
        if (!query) return filteredByState;
        return filteredByState.filter((pr) =>
          [pr.title, pr.head, pr.base, pr.owner, pr.repo, `#${pr.number}`]
            .filter(Boolean)
            .some((v) => String(v).toLowerCase().includes(query)),
        );
      }

        document
          .querySelectorAll("[data-gh-filter]")
          .forEach((btn) =>
            btn.classList.toggle("on", btn.dataset.ghFilter === ghState.prFilter),
          );
      }

      function ghSyncSearchClear() {
        document
          .getElementById("ghSearchClear")
          ?.classList.toggle("vis", !!ghState.prQuery);
      }


      function ghMakePRCard(pr) {
        const tpl = document
          .getElementById("ghPRCardTemplate")
          .content.firstElementChild.cloneNode(true);
        const badge = tpl.querySelector(".gh-pr-badge");
        const isOpen = pr.stateLabel === "Open";
        const diffUrl = `${ghState.baseUrl}/${pr.owner}/${pr.repo}/compare/${encodeURIComponent(pr.base)}...${encodeURIComponent(pr.head)}?expand=1`;

        badge.textContent = pr.stateLabel;
        badge.classList.add(isOpen ? "gh-badge-open" : "gh-badge-draft");
        tpl.querySelector(".gh-pr-repo").textContent = `${pr.owner}/${pr.repo}`;
        tpl.querySelector(".gh-pr-num").textContent = `#${pr.number}`;
        tpl.querySelector(".gh-pr-title").textContent = pr.title;
        tpl.querySelector(".gh-pr-branch").textContent = `${pr.head} → ${pr.base}`;
        tpl.querySelector(".gh-pr-date").textContent = ghFmt(pr.updatedAt);
        tpl.querySelector(".gh-pr-diff-btn").innerHTML = "";
        tpl.querySelector(".gh-pr-open-btn").innerHTML = "";
        tpl.querySelector(".gh-pr-diff-btn").appendChild(mkIco("i-extlink", "ico-sm"));
        tpl.querySelector(".gh-pr-diff-btn").appendChild(document.createTextNode(" Diff"));
        tpl.querySelector(".gh-pr-open-btn").appendChild(mkIco("i-open", "ico-sm"));
        tpl.querySelector(".gh-pr-open-btn").appendChild(document.createTextNode(" Open"));
        tpl.querySelector(".gh-pr-diff-btn").addEventListener("click", (e) => {
          e.stopPropagation();
          ghPushHistory({
            type: "DIFF",
            label: `${pr.owner}/${pr.repo}`,
            url: diffUrl,
          });
          window.api?.openUrl(diffUrl);
        });
        tpl.querySelector(".gh-pr-open-btn").addEventListener("click", (e) => {
          e.stopPropagation();
          ghPushHistory({
            type: "PR",
            label: `${pr.owner}/${pr.repo} #${pr.number}`,
            url: pr.url,
          });
          window.api?.openUrl(pr.url);
        });
        return tpl;
      }

      function ghRenderPRs() {
        const openList = ghState.prs.filter((pr) => pr.stateGroup === "open");
        const doneList = ghState.prs.filter((pr) => pr.stateGroup === "done");
        const filtered = ghApplyPRFilter(ghState.prs);
        document.getElementById("gh-n-open").textContent = openList.length;
        document.getElementById("gh-n-done").textContent = doneList.length;
        document.getElementById("gh-n-all").textContent = ghState.prs.length;
        ghRenderFilterBar();
        ghSyncSearchClear();

        ghPRList.innerHTML = "";
        if (!filtered.length) {
          ghSetListState("empty");
          return;
        }

        ghGroupByRepo(filtered).forEach(([repoName, items]) => {
          const header = document.createElement("div");
          header.className = "gh-group-header";
          const repoObj = ghState.repos.find(
            (r) => `${r.owner}/${r.repo}` === repoName,
          );
          const repoUrl = repoObj ? ghRepoWebUrl(repoObj) : "";
          header.innerHTML = `
      <div class="gh-group-dot"></div>
      <span class="gh-group-name">${repoName}</span>
      <span class="gh-group-count">${items.length}개</span>
      ${repoUrl ? `<button class="gh-group-link" type="button" title="레포 열기"></button>` : ""}`;
          if (repoUrl) {
            const linkBtn = header.querySelector(".gh-group-link");
            linkBtn.appendChild(mkIco("i-open", "ico-sm"));
            linkBtn.addEventListener("click", (e) => {
              e.stopPropagation();
              window.api?.openUrl(repoUrl);
            });
          }
          ghPRList.appendChild(header);

          items.forEach((pr) => ghPRList.appendChild(ghMakePRCard(pr)));
        });

        ghSetListState("list");
      }

      function ghRenderBuilder() {
        const repoSel = document.getElementById("ghBuildRepo");
        repoSel.innerHTML = ghState.repos
          .map(
            (repo) =>
              `<option value="${repo.owner}/${repo.repo}">${repo.owner}/${repo.repo}</option>`,
          )
          .join("");
        if (!repoSel.value && ghState.repos[0])
          repoSel.value = `${ghState.repos[0].owner}/${ghState.repos[0].repo}`;

        function renderBranches() {
          const repo = ghState.repos.find(
            (r) => `${r.owner}/${r.repo}` === repoSel.value,
          );
          const bar = document.getElementById("ghBranchBar");
          bar.innerHTML = "";
          const branches = repo?.branches?.length
            ? repo.branches
            : ghState.defaultBranches?.length
              ? ghState.defaultBranches
              : ["main", "dev", "stg"];
          const selected =
            ghState.selectedBaseByRepo[repoSel.value] || branches[0];
          ghState.selectedBaseByRepo[repoSel.value] = selected;

          branches.forEach((branch) => {
            const btn = document.createElement("button");
            btn.type = "button";
            btn.className = `ptag${branch === ghState.selectedBaseByRepo[repoSel.value] ? " on" : ""}`;
            btn.textContent = branch;
            btn.addEventListener("click", () => {
              ghState.selectedBaseByRepo[repoSel.value] = branch;
              renderBranches();
            });
            bar.appendChild(btn);
          });
        }

        repoSel.onchange = renderBranches;
        renderBranches();
      }

      async function ghFetchPRs() {
        if (!ghState.token || !ghState.baseUrl || !ghState.repos.length) {
          ghSetListState(
            "error",
            "⚙️ 설정에서 Base URL, PAT, 레포를 입력해주세요!",
          );
          return;
        }
        ghSetListState("loading");
        try {
          const result =
            (await window.api?.fetchGHPRs?.(
              ghState.baseUrl,
              ghState.token,
              ghState.repos,
            )) || {};
          ghState.prs       = Array.isArray(result.prs) ? result.prs : [];
          ghState.login     = result.login     || "";
          ghState.avatarUrl = result.avatarUrl || "";
          ghRenderUserBadge();
          ghRenderPRs();
        } catch (e) {
          ghSetListState("error", `❌ ${e.message || "PR 불러오기 실패"}`);
        }
      }

      function ghSetTab(tab) {
        ghState.tab = tab;
        document
          .querySelectorAll("[data-gh-tab]")
          .forEach((btn) =>
            btn.classList.toggle("on", btn.dataset.ghTab === tab),
          );
        if (tab === "home") {
          ghSetView("home");
          ghRenderHome();
        } else if (tab === "builder") {
          ghSetView("builder");
          ghRenderBuilder();
        } else {
          ghSetView("list");
          ghRenderPRs();
        }
      }

      async function ghToggleSettings() {
        ghState.isSettings = !ghState.isSettings;
        const btn = document.getElementById("ghSettingsBtn");
        btn.classList.toggle("button-back", ghState.isSettings);
        btn.classList.toggle("button-setting", !ghState.isSettings);
        document.getElementById("ghTabRow").hidden = ghState.isSettings;
        document.getElementById("ghRbtn").hidden = ghState.isSettings;
        document.getElementById("ghPtitle").textContent = ghState.isSettings
          ? "Setting"
          : "GitHub";

        if (ghState.isSettings) {
          await ghLoadSettings();
          ghRenderSettingsUI();
          ghSetView("settings");
        } else {
          ghSetTab(ghState.tab);
          if (ghState.tab === "prs") await ghFetchPRs();
        }
      }

      async function ghTogglePanel() {
        ghState.open = !ghState.open;
        ghPanel.classList.toggle("open", ghState.open);

        if (ghState.open) {
          if (open) {
            open = false;
            document.getElementById("panel").classList.remove("open");
          }

          ghState.isSettings = false;
          document
            .getElementById("ghSettingsBtn")
            .classList.remove("button-back");
          document
            .getElementById("ghSettingsBtn")
            .classList.add("button-setting");
          document.getElementById("ghTabRow").hidden = false;
          document.getElementById("ghRbtn").hidden = false;
          document.getElementById("ghPtitle").textContent = "GitHub";

          await ghLoadSettings();
          await ghLoadHistory();

          if (ghState.token && ghState.baseUrl && ghState.repos.length) {
            await ghFetchPRs();
          } else {
            document.getElementById("gh-n-all").textContent = "0";
            document.getElementById("gh-n-open").textContent = "0";
            document.getElementById("gh-n-done").textContent = "0";
          }

          ghRenderHome();
          ghSetTab("home");
        }
      }

      document
        .getElementById("ghDockBtn")
        .addEventListener("click", ghTogglePanel);
      document.getElementById("ghCloseBtn").addEventListener("click", () => {
        if (ghState.open) ghTogglePanel();
      });
      document.getElementById("ghRbtn").addEventListener("click", () => {
        if (ghState.tab === "prs") ghFetchPRs();
        else if (ghState.tab === "home") ghRenderHome();
        else ghRenderBuilder();
      });
      document
        .getElementById("ghSettingsBtn")
        .addEventListener("click", ghToggleSettings);
      document
        .getElementById("ghAddRepoBtn")
        .addEventListener("click", () =>
          ghAddRepoRow({ branches: ghState.defaultBranches }),
        );
      document.querySelectorAll("[data-gh-tab]").forEach((btn) =>
        btn.addEventListener("click", async () => {
          const tab = btn.dataset.ghTab;
          ghState.tab = tab;
          document
            .querySelectorAll("[data-gh-tab]")
            .forEach((b) => b.classList.toggle("on", b.dataset.ghTab === tab));
          if (tab === "home") {
            ghSetView("home");
            ghRenderHome();
          } else if (tab === "builder") {
            ghSetView("builder");
            ghRenderBuilder();
          } else {
            ghSetView("list");
            await ghFetchPRs();
          }
        }),
      );
      document.querySelectorAll("[data-gh-filter]").forEach((btn) =>
        btn.addEventListener("click", () => {
          ghState.prFilter = btn.dataset.ghFilter;
          ghRenderPRs();
        }),
      );
      document.getElementById("ghSearchInput").addEventListener("input", (e) => {
        ghState.prQuery = e.target.value || "";
        ghRenderPRs();
      });
      document.getElementById("ghSearchInput").addEventListener("keydown", (e) => {
        if (e.key === "Escape") {
          ghState.prQuery = "";
          e.currentTarget.value = "";
          ghRenderPRs();
        }
      });
      document.getElementById("ghSearchClear").addEventListener("click", () => {
        ghState.prQuery = "";
        const input = document.getElementById("ghSearchInput");
        input.value = "";
        ghRenderPRs();
      });
      document
        .getElementById("ghSaveBtn")
        .addEventListener("click", async () => {
          await ghSaveSettings();
          ghState.isSettings = true;
          await ghToggleSettings();
          ghRenderHome();
        });

      document.getElementById("ghGoPrBtn").addEventListener("click", () => {
        const repoFull = document.getElementById("ghBuildRepo").value;
        const head = document.getElementById("ghHeadInput").value.trim();
        const base = ghState.selectedBaseByRepo[repoFull];
        const status = document.getElementById("ghBuildStatus");
        if (!repoFull || !head || !base) {
          status.textContent =
            "⚠️ 레포, base 브랜치, compare 값을 확인해주세요!";
          return;
        }
        const url = `${ghState.baseUrl}/${repoFull}/compare/${encodeURIComponent(base)}...${encodeURIComponent(head)}?expand=1`;
        ghPushHistory({ type: "PR", label: repoFull, url });
        window.api?.openUrl(url);
      });

      document.getElementById("ghCopyPrBtn").addEventListener("click", () => {
        const repoFull = document.getElementById("ghBuildRepo").value;
        const head = document.getElementById("ghHeadInput").value.trim();
        const base = ghState.selectedBaseByRepo[repoFull];
        const status = document.getElementById("ghBuildStatus");
        if (!repoFull || !head || !base) {
          status.textContent =
            "⚠️ 레포, base 브랜치, compare 값을 확인해주세요!";
          return;
        }
        const url = `${ghState.baseUrl}/${repoFull}/compare/${encodeURIComponent(base)}...${encodeURIComponent(head)}?expand=1`;
        navigator.clipboard?.writeText(url).then(() => {
          status.textContent = "📋 복사됐어요!";
          setTimeout(() => {
            status.textContent = "";
          }, 2000);
        });
      });

      document.getElementById("ghGoDiffBtn").addEventListener("click", () => {
        const repoFull = document.getElementById("ghBuildRepo").value;
        const base = document.getElementById("ghBaseShaInput").value.trim();
        const head = document.getElementById("ghHeadShaInput").value.trim();
        const status = document.getElementById("ghBuildStatus");
        if (!repoFull || !base || !head) {
          status.textContent = "⚠️ 레포와 SHA 두 개를 모두 입력해주세요!";
          return;
        }
        const url = `${ghState.baseUrl}/${repoFull}/compare/${encodeURIComponent(base)}...${encodeURIComponent(head)}?expand=1`;
        ghPushHistory({ type: "DIFF", label: repoFull, url });
        window.api?.openUrl(url);
      });

      document.getElementById("ghCopyDiffBtn").addEventListener("click", () => {
        const repoFull = document.getElementById("ghBuildRepo").value;
        const base = document.getElementById("ghBaseShaInput").value.trim();
        const head = document.getElementById("ghHeadShaInput").value.trim();
        const status = document.getElementById("ghBuildStatus");
        if (!repoFull || !base || !head) {
          status.textContent = "⚠️ 레포와 SHA 두 개를 모두 입력해주세요!";
          return;
        }
        const url = `${ghState.baseUrl}/${repoFull}/compare/${encodeURIComponent(base)}...${encodeURIComponent(head)}?expand=1`;
        navigator.clipboard?.writeText(url).then(() => {
          status.textContent = "📋 복사됐어요!";
          setTimeout(() => {
            status.textContent = "";
          }, 2000);
        });
      });

      async function ghInit() {
        await ghLoadSettings();
        await ghLoadHistory();
      }
      // ghInit();

      
    </script>
  </body>
</html>
